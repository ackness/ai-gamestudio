services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-gamestudio:latest
    container_name: ai-gamestudio
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point inside the container data volume
      DATABASE_URL: sqlite+aiosqlite:///data/db.sqlite
    volumes:
      # Persist database, logs, audit trail, and secrets across restarts
      - ai-gamestudio-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ai-gamestudio-data:
    driver: local
