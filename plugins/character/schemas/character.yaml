type: object
required: [name, role]
properties:
  name:
    type: string
    description: 角色名称
  role:
    type: string
    enum: [player, npc]
  description:
    type: string
  personality:
    type: string
    description: NPC 人格描述
  attributes:
    type: object
    additionalProperties: true
    description: 动态属性（根据世界观自动生成）
  inventory:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        quantity:
          type: integer
